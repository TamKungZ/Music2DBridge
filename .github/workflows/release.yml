name: Release Build

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  DOTNET_VERSION: "9.0.x"
  APP_NAME: "Music2DBridge"
  PROJECT_PATH: "src/Music2DBridge.App/Music2DBridge.App.csproj"

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            rid: win-x64
            kind: windows
          - label: linux-x64
            os: ubuntu-22.04
            rid: linux-x64
            kind: linux
          - label: macos-x64
            os: macos-13
            rid: osx-x64
            kind: macos
          - label: macos-arm64
            os: macos-14
            rid: osx-arm64
            kind: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ matrix.rid }}
          -p:PublishSingleFile=true
          -p:SelfContained=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Stage assets (Windows)
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release_assets | Out-Null
          $publishDir = "src/Music2DBridge.App/bin/Release/net9.0/${{ matrix.rid }}/publish"
          Copy-Item "$publishDir/Music2DBridge.exe" "release_assets/Music2DBridge-windows-x64.exe"

      - name: Install Linux packaging tools
        if: matrix.kind == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y file desktop-file-utils squashfs-tools
          curl -L -o appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

      - name: Stage assets (Linux + AppImage)
        if: matrix.kind == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release_assets
          PUBLISH_DIR="src/Music2DBridge.App/bin/Release/net9.0/${{ matrix.rid }}/publish"

          # Raw binary
          cp "$PUBLISH_DIR/Music2DBridge" "release_assets/Music2DBridge-linux-x64"
          chmod +x "release_assets/Music2DBridge-linux-x64"

          # Build AppImage
          APPDIR="Music2DBridge.AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"

          cp "$PUBLISH_DIR/Music2DBridge" "$APPDIR/usr/bin/Music2DBridge"
          chmod +x "$APPDIR/usr/bin/Music2DBridge"

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/usr/bin/env bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Music2DBridge" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          cat > "$APPDIR/Music2DBridge.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Music2DBridge
          Exec=Music2DBridge
          Icon=Music2DBridge
          Categories=AudioVideo;Utility;
          Terminal=false
          EOF

          # Tiny fallback icon
          ICON_B64="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO7Z0XcAAAAASUVORK5CYII="
          echo "$ICON_B64" | base64 -d > "$APPDIR/Music2DBridge.png"
          cp "$APPDIR/Music2DBridge.png" "$APPDIR/.DirIcon"

          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool "$APPDIR" "release_assets/Music2DBridge-linux-x64.AppImage"

      - name: Stage assets (macOS)
        if: matrix.kind == 'macos'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release_assets
          PUBLISH_DIR="src/Music2DBridge.App/bin/Release/net9.0/${{ matrix.rid }}/publish"
          BIN_NAME="Music2DBridge-macos-${{ matrix.rid == 'osx-x64' && 'x64' || 'arm64' }}"

          cp "$PUBLISH_DIR/Music2DBridge" "release_assets/$BIN_NAME"
          chmod +x "release_assets/$BIN_NAME"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.label }}
          path: release_assets/*
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          merge-multiple: true
          path: release_files

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release_files/*