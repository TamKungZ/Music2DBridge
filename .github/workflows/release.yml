name: Release Build

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  DOTNET_VERSION: "9.0.x"
  APP_NAME: "Music2DBridge"
  PROJECT_PATH: "src/Music2DBridge.App/Music2DBridge.App.csproj"

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            rid: win-x64
            kind: windows
            timeout: 20
          - label: linux-x64
            os: ubuntu-22.04
            rid: linux-x64
            kind: linux
            timeout: 20
          # TEMPORARY DISABLED: macos-x64 runner often stays queued too long.
          # Re-enable when GitHub macOS x64 capacity is stable again.
          # - label: macos-x64
          #   os: macos-13
          #   rid: osx-x64
          #   kind: macos
          #   timeout: 2
          - label: macos-arm64
            os: macos-14
            rid: osx-arm64
            kind: macos
            timeout: 20

    timeout-minutes: ${{ matrix.timeout }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ matrix.rid }}
          -p:SelfContained=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Publish Windows single-file exe
        if: matrix.kind == 'windows'
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ matrix.rid }}
          -p:SelfContained=true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o artifacts/windows-single

      - name: Self-sign Windows executable (disabled)
        if: ${{ false }}
        shell: pwsh
        run: |
          $publishDir = "src/Music2DBridge.App/bin/Release/net9.0/${{ matrix.rid }}/publish"
          $exePath = Join-Path $publishDir "Music2DBridge.exe"
          $singleExePath = "artifacts/windows-single/Music2DBridge.exe"

          if (-not (Test-Path $exePath)) {
            throw "Executable not found for signing: $exePath"
          }
          if (-not (Test-Path $singleExePath)) {
            throw "Single-file executable not found for signing: $singleExePath"
          }

          $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
          if (-not $signtool) {
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Filter signtool.exe -Recurse -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $signtool) {
            throw "signtool.exe not found"
          }

          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=TamKungZ_" `
            -KeyExportPolicy Exportable `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -HashAlgorithm SHA256 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(2)

          $pfxPasswordPlain = "music2d-temp-sign"
          $pfxPassword = ConvertTo-SecureString -String $pfxPasswordPlain -Force -AsPlainText
          $pfxPath = Join-Path $env:RUNNER_TEMP "music2d-selfsign.pfx"

          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pfxPassword | Out-Null

          $cerPath = Join-Path $env:RUNNER_TEMP "music2d-selfsign.cer"
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null
          Import-Certificate -FilePath $cerPath -CertStoreLocation "Cert:\CurrentUser\Root" | Out-Null

          & $signtool sign /fd SHA256 /f $pfxPath /p $pfxPasswordPlain /tr http://timestamp.digicert.com /td SHA256 $exePath
          if ($LASTEXITCODE -ne 0) {
            throw "signtool sign failed"
          }

          & $signtool sign /fd SHA256 /f $pfxPath /p $pfxPasswordPlain /tr http://timestamp.digicert.com /td SHA256 $singleExePath
          if ($LASTEXITCODE -ne 0) {
            throw "signtool sign failed (single-file exe)"
          }

          & $signtool verify /pa /v $exePath
          if ($LASTEXITCODE -ne 0) {
            throw "signtool verify failed"
          }

          & $signtool verify /pa /v $singleExePath
          if ($LASTEXITCODE -ne 0) {
            throw "signtool verify failed (single-file exe)"
          }

      - name: Stage assets (Windows)
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release_assets | Out-Null
          $publishDir = "src/Music2DBridge.App/bin/Release/net9.0/${{ matrix.rid }}/publish"
          Copy-Item "artifacts/windows-single/Music2DBridge.exe" "release_assets/Music2DBridge-windows-x64.exe"

          $zipStaging = Join-Path $env:RUNNER_TEMP "Music2DBridge-windows-x64"
          if (Test-Path $zipStaging) {
            Remove-Item $zipStaging -Recurse -Force
          }

          Copy-Item $publishDir $zipStaging -Recurse
          Compress-Archive -Path "$zipStaging\*" -DestinationPath "release_assets/Music2DBridge-windows-x64.zip" -Force

      - name: Install Linux packaging tools
        if: matrix.kind == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y file desktop-file-utils squashfs-tools
          curl -L -o appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

      - name: Stage assets (Linux + AppImage)
        if: matrix.kind == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release_assets
          PUBLISH_DIR="src/Music2DBridge.App/bin/Release/net9.0/${{ matrix.rid }}/publish"

          # Raw binary
          cp "$PUBLISH_DIR/Music2DBridge" "release_assets/Music2DBridge-linux-x64"
          chmod +x "release_assets/Music2DBridge-linux-x64"

          # Build AppImage
          APPDIR="Music2DBridge.AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"

          cp "$PUBLISH_DIR/Music2DBridge" "$APPDIR/usr/bin/Music2DBridge"
          chmod +x "$APPDIR/usr/bin/Music2DBridge"

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/usr/bin/env bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Music2DBridge" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          cat > "$APPDIR/Music2DBridge.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Music2DBridge
          Exec=Music2DBridge
          Icon=Music2DBridge
          Categories=AudioVideo;Utility;
          Terminal=false
          EOF

          # Real app icon from repository assets
          cp "assets/icon-512.png" "$APPDIR/Music2DBridge.png"
          cp "$APPDIR/Music2DBridge.png" "$APPDIR/.DirIcon"

          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool "$APPDIR" "release_assets/Music2DBridge-linux-x64.AppImage"

      - name: Stage assets (macOS)
        if: matrix.kind == 'macos'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release_assets
          PUBLISH_DIR="src/Music2DBridge.App/bin/Release/net9.0/${{ matrix.rid }}/publish"
          BIN_NAME="Music2DBridge-macos-${{ matrix.rid == 'osx-x64' && 'x64' || 'arm64' }}"

          cp "$PUBLISH_DIR/Music2DBridge" "release_assets/$BIN_NAME"
          chmod +x "release_assets/$BIN_NAME"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.label }}
          path: release_assets/*
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          merge-multiple: true
          path: release_files

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release_files
          sha256sum * > SHA256SUMS

      - name: Import GPG private key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [ -z "${GPG_PRIVATE_KEY:-}" ] || [ -z "${GPG_PASSPHRASE:-}" ]; then
            echo "GPG signing skipped: GPG_PRIVATE_KEY or GPG_PASSPHRASE is not configured."
            exit 0
          fi

          if printf '%s' "$GPG_PRIVATE_KEY" | grep -q "BEGIN PGP PRIVATE KEY BLOCK"; then
            printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          else
            printf '%s' "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          fi

      - name: Sign SHA256SUMS with GPG
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [ -z "${GPG_PRIVATE_KEY:-}" ] || [ -z "${GPG_PASSPHRASE:-}" ]; then
            echo "Skipping SHA256SUMS signing (missing GPG secrets)."
            exit 0
          fi

          cd release_files
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --armor --detach-sign \
            --output SHA256SUMS.asc \
            SHA256SUMS

      - name: Export GPG public key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [ -z "${GPG_PRIVATE_KEY:-}" ] || [ -z "${GPG_PASSPHRASE:-}" ]; then
            echo "Skipping GPG public key export (missing GPG secrets)."
            exit 0
          fi

          gpg --batch --yes --armor --export > release_files/GPG-KEY.asc

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release_files/*
